<style>
    /* --- Grid & Tile Styles --- */
    #inspiration-wrapper {
        padding: 20px 0;
        width: 100%;
        min-height: 200px;
    }

    /* FACELIFT: Card grid with 1px gap using border as separator */
    .inspiration-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1px;
        background: var(--nova-border, var(--border-medium));
        border-radius: 10px;
        overflow: hidden;
    }

    /* FACELIFT: Card styling */
    .astro-tile {
        background: var(--nova-surface, var(--bg-white));
        border: none;
        border-radius: 0;
        overflow: hidden;
        transition: box-shadow 0.15s ease;
        display: flex;
        flex-direction: column;
        height: 100%;
        cursor: pointer;
        position: relative;
    }

    .astro-tile:hover {
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        z-index: 1;
        position: relative;
    }

    [data-theme="dark"] .astro-tile:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* FACELIFT: Card image area - edge-to-edge, no border-radius */
    .tile-image {
        width: 100%;
        height: 200px;
        background-color: var(--nova-surface-alt, var(--bg-light-alt));
        position: relative;
        overflow: hidden;
        border-bottom: none;
        border-radius: 0;
    }

    .tile-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* FACELIFT: Common badge base styles */
    .img-source-badge,
    .tile-type {
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 9px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.85);
        font-family: var(--nova-font-mono, 'DM Mono', monospace);
        backdrop-filter: blur(4px);
    }

    /* FACELIFT: Attribution Badge overlay on image - bottom-left */
    .img-source-badge {
        position: absolute;
        bottom: 8px;
        left: 8px;
        right: auto;
        max-width: 55%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        pointer-events: none;
    }

    .tile-content {
        padding: 12px 14px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .tile-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 2px;
        position: relative;
    }

    /* FACELIFT: Object name - 13px, font-weight:700, nova-text */
    .tile-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--nova-text, var(--text-primary));
        font-family: var(--nova-font-mono, 'DM Mono', monospace);
    }

    /* FACELIFT: Type badge - positioned top-right, overlay style */
    .tile-type {
        position: absolute;
        top: -34px;
        right: 8px;
        text-transform: uppercase;
    }

    /* FACELIFT: Common name - 11px, nova-text-3 */
    .tile-common-name {
        font-size: 11px;
        color: var(--nova-text-3, var(--text-tertiary));
        font-style: italic;
        margin-bottom: 4px;
    }

    .tile-summary {
        font-size: 12px;
        color: var(--nova-text-2, var(--text-secondary));
        line-height: 1.5;
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex-grow: 1;
    }

    /* FACELIFT: Alt/Dur stats - 11px, mono, nova-text-3 */
    .tile-stats {
        display: flex;
        gap: 10px;
        margin-top: auto;
        font-size: 11px;
        font-family: var(--nova-font-mono, 'DM Mono', monospace);
        color: var(--nova-text-3, var(--text-tertiary));
    }

    .tile-stat-pill {
        background: transparent;
        padding: 0;
        border-radius: 0;
        border: none;
    }

    /* --- Modal Styles --- */
    .insp-modal-backdrop {
        display: none;
        position: fixed;
        z-index: 3000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.6);
        backdrop-filter: blur(2px);
    }

    .insp-modal-content {
        background-color: var(--bg-white);
        margin: 5vh auto;
        width: 90%;
        max-width: 800px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 90vh;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .insp-modal-body {
        display: flex;
        flex-direction: row;
        overflow-y: auto;
    }

    .insp-modal-image {
        width: 40%;
        background: var(--text-black);
        min-height: 300px;
        position: relative;
    }

    .insp-modal-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .insp-modal-details {
        width: 60%;
        padding: 30px;
        display: flex;
        flex-direction: column;
    }

    .insp-modal-title { font-size: 2em; font-weight: bold; margin: 0 0 5px 0; color: var(--accent-teal); }
    .insp-modal-subtitle { font-size: 1.2em; color: var(--text-tertiary); font-style: italic; margin-bottom: 20px; }

    .insp-modal-text {
        font-size: 1em;
        line-height: 1.6;
        color: var(--text-dark-alt);
        margin-bottom: 25px;
    }

    .insp-data-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        background: var(--bg-light);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
    }

    .insp-data-item strong { display: block; font-size: 0.8em; color: var(--text-muted); text-transform: uppercase; }
    .insp-data-item span { font-size: 1.1em; font-weight: 600; color: var(--text-primary); }

    .insp-modal-footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between; /* Space out attribution and buttons */
        align-items: center;
        gap: 10px;
    }

    .modal-attribution {
        font-size: 0.8em;
        color: var(--text-muted-alt);
    }

    .modal-attribution a {
        color: var(--text-muted-alt);
        text-decoration: underline;
    }

    .btn-close-modal {
        background: transparent;
        border: 1px solid var(--border-medium-alt);
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-primary);
    }

    .btn-close-modal:hover {
        background: var(--bg-light-gray);
    }

    .btn-view-graph {
        background: var(--primary-color);
        color: var(--text-white);
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
    }
    .btn-view-graph:hover { background: var(--primary-dark); }

    /* Skeleton Loading State */
    .skeleton-pulse { animation: pulse 1.5s infinite ease-in-out; background-color: var(--bg-medium-alt); }
    @keyframes pulse { 0% { background-color: var(--bg-medium-alt); } 50% { background-color: var(--text-lighter); } 100% { background-color: var(--bg-medium-alt); } }

    @media (max-width: 700px) {
        .insp-modal-body { flex-direction: column; }
        .insp-modal-image, .insp-modal-details { width: 100%; }
        .insp-modal-image { height: 200px; }
    }

    /* --- New Educational States --- */
    .inspiration-banner {
        background: var(--bg-light-gray);
        border: 1px solid var(--info-color-alt);
        color: var(--info-text);
        padding: 15px 20px;
        margin-bottom: 25px;
        border-radius: 8px;
        display: flex;
        align-items: start;
        gap: 15px;
        font-size: 14px;
        line-height: 1.5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .inspiration-banner strong { color: var(--text-primary); font-size: 15px; }
    .inspiration-banner .close-banner {
        cursor: pointer;
        font-weight: bold;
        color: var(--info-text);
        opacity: 0.5;
        margin-left: auto;
        font-size: 18px;
        line-height: 1;
    }
    .inspiration-banner .close-banner:hover { opacity: 1; }

    .empty-state-styled {
        /* CRITICAL FIX: Force the box to span all grid columns (1 to end) */
        grid-column: 1 / -1;

        text-align: center;
        padding: 60px 20px;
        color: var(--text-tertiary);
        background: var(--bg-light-alt);
        border-radius: 12px;
        border: 2px dashed var(--text-lightest);
        /* Center horizontally and limit width for better appearance */
        margin: 40px auto;
        max-width: 600px;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.8; }
    .empty-state-box {
        text-align: left;
        display: inline-block;
        max-width: 450px;
        font-size: 14px;
        background: var(--bg-white);
        padding: 20px 25px;
        border-radius: 8px;
        border: 1px solid var(--bg-medium-alt);
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    /* Loading Spinner */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .insp-spinner {
        border: 4px solid var(--bg-light-gray);
        border-top: 4px solid var(--info-color-alt);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px auto;
    }

    /* ===================================================================
       DARK MODE OVERRIDES - INSPIRATION GALLERY
       ================================================================ */

    [data-theme="dark"] .inspiration-grid {
        background: var(--nova-border, rgba(255,255,255,0.07));
    }

    [data-theme="dark"] .astro-tile {
        background: var(--nova-surface, var(--bg-dark-secondary));
    }

    [data-theme="dark"] .tile-image {
        background-color: var(--nova-surface-alt, var(--bg-dark-primary));
    }

    [data-theme="dark"] .tile-title {
        color: var(--nova-text, rgba(255,255,255,0.92));
    }

    [data-theme="dark"] .tile-common-name {
        color: var(--nova-text-3, rgba(255,255,255,0.30));
    }

    [data-theme="dark"] .tile-summary {
        color: var(--nova-text-2, rgba(255,255,255,0.55));
    }

    [data-theme="dark"] .tile-stats {
        color: var(--nova-text-3, rgba(255,255,255,0.30));
    }

    [data-theme="dark"] .inspiration-banner {
        background: var(--nova-surface-alt, var(--bg-dark-primary));
        border-color: var(--nova-accent-light, rgba(122,175,192,0.2));
    }

    [data-theme="dark"] .inspiration-banner strong {
        color: var(--nova-text, rgba(255,255,255,0.92));
    }

    [data-theme="dark"] .empty-state-styled {
        background: var(--nova-surface-alt, var(--bg-dark-primary));
        border-color: var(--nova-border, rgba(255,255,255,0.07));
    }

    [data-theme="dark"] .empty-state-box {
        background: var(--nova-surface, var(--bg-dark-secondary));
        border-color: var(--nova-border, rgba(255,255,255,0.07));
    }

    [data-theme="dark"] .insp-modal-content {
        background-color: var(--nova-surface, var(--bg-dark-secondary));
    }

    [data-theme="dark"] .insp-modal-title {
        color: var(--nova-accent, #7aafc0);
    }

    [data-theme="dark"] .insp-modal-subtitle {
        color: var(--nova-text-3, rgba(255,255,255,0.30));
    }

    [data-theme="dark"] .insp-modal-text {
        color: var(--nova-text-2, rgba(255,255,255,0.55));
    }

    [data-theme="dark"] .insp-data-grid {
        background: var(--nova-surface-alt, var(--bg-dark-primary));
    }

    [data-theme="dark"] .insp-data-item strong {
        color: var(--nova-text-4, rgba(255,255,255,0.18));
    }

    [data-theme="dark"] .insp-data-item span {
        color: var(--nova-text, rgba(255,255,255,0.92));
    }

    [data-theme="dark"] .modal-attribution {
        color: var(--nova-text-3, rgba(255,255,255,0.30));
    }

    [data-theme="dark"] .modal-attribution a {
        color: var(--nova-accent, #7aafc0);
    }

    [data-theme="dark"] .btn-close-modal {
        background: transparent;
        border-color: var(--nova-border, rgba(255,255,255,0.07));
        color: var(--nova-text, rgba(255,255,255,0.92));
    }

    [data-theme="dark"] .btn-close-modal:hover {
        background: var(--nova-surface-alt, var(--bg-dark-primary));
    }

    [data-theme="dark"] .btn-view-graph {
        background: var(--nova-accent, #7aafc0);
    }

    [data-theme="dark"] .btn-view-graph:hover {
        background: var(--nova-accent-mid, #8ec8da);
    }

    [data-theme="dark"] .insp-spinner {
        border-color: var(--nova-surface-alt, var(--bg-dark-primary));
        border-top-color: var(--nova-accent, #7aafc0);
    }
</style>

<div id="inspiration-tab-content" style="display:none;">
    <div id="inspiration-controls" style="margin-bottom: 16px; display: flex; justify-content: flex-end;">
        <button type="button" data-action="refresh-inspiration" class="btn-accent-light">
            ↻ {{ _('Refresh Suggestions') }}
        </button>
    </div>

    <div id="inspiration-wrapper">
        <div id="inspiration-grid" class="inspiration-grid"></div>
        <div id="inspiration-loading" style="display:none; text-align:center; padding:40px; color:var(--text-tertiary);">
            {{ _('Processing targets...') }}
        </div>
    </div>
</div>

<div id="inspiration-modal" class="insp-modal-backdrop" aria-labelledby="insp-modal-title" role="dialog" aria-modal="true">
    <div class="insp-modal-content" data-stop-propagation="true">
        <div class="insp-modal-body">
            <div class="insp-modal-image">
                <img id="modal-img" src="" alt="Object Image">
            </div>
            <div class="insp-modal-details">
                <h2 id="insp-modal-title" class="insp-modal-title"></h2>
                <div id="modal-subtitle" class="insp-modal-subtitle"></div>

                <div id="modal-text" class="insp-modal-text"></div>

                <div class="insp-data-grid">
                    <div class="insp-data-item"><strong>{{ _('Max Altitude') }}</strong><span id="modal-alt"></span></div>
                    <div class="insp-data-item"><strong>{{ _('Transit Time') }}</strong><span id="modal-transit"></span></div>
                    <div class="insp-data-item"><strong>{{ _('Duration') }}</strong><span id="modal-dur"></span></div>
                    <div class="insp-data-item"><strong>{{ _('Constellation') }}</strong><span id="modal-const"></span></div>
                </div>

                <div class="insp-modal-footer">
                    <div id="modal-attribution" class="modal-attribution">{{ _('Source: Wiki') }}</div>
                    <div style="display:flex; gap:10px; flex-shrink: 0;">
                        <button class="btn-close-modal" data-action="close-inspiration-modal">{{ _('Close') }}</button>
                        <button class="btn-view-graph" id="modal-graph-btn">{{ _('View Charts') }} &rarr;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const i18n = {
        // Existing strings
        analyzingTargets:  {{ _("Analyzing targets...") | tojson }},
        noImage:           {{ _("No Image") | tojson }},
        unknown:           {{ _("unknown") | tojson }},
        errorRenderGrid:   {{ _("Error rendering grid. Check console.") | tojson }},
        imageUnavailable:  {{ _("Image unavailable") | tojson }},

        // Empty state strings
        howToPopulate:     {{ _("How to populate this gallery:") | tojson }},
        checkFilters:      {{ _("Check Filters:") | tojson }},
        checkFiltersDesc:  {{ _("Clear filters on the Position tab.") | tojson }},
        checkDatabase:     {{ _("Check Database:") | tojson }},
        checkDatabaseDesc: {{ _("Ensure you have objects in Configuration.") | tojson }},
        visibility:        {{ _("Visibility:") | tojson }},
        visibilityDesc:    {{ _("We only show objects observable during tonight's session.") | tojson }},

        // Tile stats
        alt:               {{ _("Alt:") | tojson }},
        dur:               {{ _("Dur:") | tojson }},
        hrs:               {{ _("hrs") | tojson }},
        h:                 {{ _("h") | tojson }},
        loading:           {{ _("Loading...") | tojson }},

        // Fallback text
        type:              {{ _("Type:") | tojson }},
        dso:               {{ _("DSO") | tojson }},
        locatedIn:         {{ _("Located in") | tojson }},
        na:                {{ _("N/A") | tojson }},

        // Source attribution
        source:            {{ _("Source:") | tojson }},
        sourceWikipedia:   {{ _("Wikipedia") | tojson }},
        sourceNasa:        {{ _("NASA") | tojson }},
        sourceDss2:        {{ _("Aladin Sky Atlas / DSS2") | tojson }},
    };

    function getAladinFallbackUrl(ra, dec, sizeArcmin) {
        if (ra == null || dec == null) return null;
        let size = parseFloat(sizeArcmin) || 15;
        if (size < 5) size = 5;
        if (size > 60) size = 60;
        return `https://archive.stsci.edu/cgi-bin/dss_search?v=poss2ukstu_red&r=${ra}&d=${dec}&e=J2000&h=${size}&w=${size}&f=gif&c=none`;
    }

    // ========================================================================
    // MODAL INITIALIZATION
    // ========================================================================
    let inspirationModalController = null;

    // Initialize modal controller when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        if (window.novaState && window.novaState.fn && window.novaState.fn.ModalController) {
            inspirationModalController = new window.novaState.fn.ModalController('inspiration-modal', {
                contentId: null, // No separate content wrapper for inspiration modal
                displayStyle: 'block',
                closeOnBackdrop: true,
                closeOnEscape: true,
                ariaLabelledBy: 'insp-modal-title',
                skipFocus: true // Don't auto-focus any element when opening
            });

            // Store reference in window.novaState for global access
            window.novaState.fn.inspirationModal = inspirationModalController;
        } else {
            console.warn('[Inspiration] ModalController not available, using fallback behavior');
        }
    });

    // ========================================================================
    // 3. MAIN LOGIC (Failsafe)
    // ========================================================================
    async function renderInspirationGrid(event) {
        if(event) { event.preventDefault(); event.stopPropagation(); }

        const grid = document.getElementById('inspiration-grid');
        const loading = document.getElementById('inspiration-loading');
        if (!grid) return;

        try {
            grid.innerHTML = '';
            loading.style.display = 'block';
            loading.textContent = i18n.analyzingTargets;

            // 1. Get Data (Safety Check)
            let dataSource = window.currentFilteredData;
            // Check total count to distinguish between "Filtering" and "Loading/Empty DB"
            const totalDataCount = (window.latestDSOData || []).length;

            // FIX: Only fallback to full data if NO filters are active.
            // If filters ARE active but returned 0 results, dataSource should remain empty.
            if ((!dataSource || dataSource.length === 0) && !window.isListFiltered) {
                dataSource = window.latestDSOData || [];
            }

            // Remove any existing banners from previous renders
            const existingBanner = document.querySelector('.inspiration-banner');
            if (existingBanner) existingBanner.remove();

            // Check global loading state from main app
            const isGlobalLoading = document.getElementById("data-body")?.dataset.loading === 'true';

            if (dataSource.length === 0) {
                loading.style.display = 'none';

                // --- RICH EMPTY STATE ---
                const isTrueFilterZero = window.isListFiltered && totalDataCount > 0;

                // Dynamic Loading State Handling
                let iconHtml = '<div class="empty-state-icon">{{ _("No Matching Targets") }}</div>';
                let title = "{{ _('No Matching Targets') }}";
                let reason = "{{ _('Your current filters (Position Tab) are too restrictive.') }}";

                if (!isTrueFilterZero) {
                    if (isGlobalLoading) {
                        // Active Loading State
                        iconHtml = '<div class="insp-spinner"></div>';
                        title = "{{ _('Loading Object Database...') }}";
                        reason = "{{ _('Please wait while we calculate visibility and fetch data.') }}";
                    } else {
                        // Truly Empty DB state
                        title = "{{ _('Database Empty') }}";
                        reason = "{{ _('No objects found in your configuration.') }}";
                    }
                }

                grid.innerHTML = `
                    <div class="empty-state-styled">
                        ${iconHtml}
                        <h3 style="margin: 0 0 10px 0; color: var(--text-primary);">${title}</h3>
                        <p style="margin: 0 0 25px 0;">${reason}</p>
                        <div class="empty-state-box">
                            <strong style="color:var(--text-primary);">${i18n.howToPopulate}</strong>
                            <ul style="margin: 10px 0 0 0; padding-left: 20px; color: var(--text-secondary); line-height:1.6;">
                                <li><strong>${i18n.checkFilters}</strong> ${i18n.checkFiltersDesc}</li>
                                <li><strong>${i18n.checkDatabase}</strong> ${i18n.checkDatabaseDesc}</li>
                                <li><strong>${i18n.visibility}</strong> ${i18n.visibilityDesc}</li>
                            </ul>
                        </div>
                    </div>`;
                return;
            }

            // 2. Filter Candidates (with fallback)
            let candidates = filterCandidates(dataSource, 40, 45); // Gold
            if (candidates.length === 0) candidates = filterCandidates(dataSource, 25, 30); // Silver
            if (candidates.length === 0) candidates = filterCandidates(dataSource, 15, 1); // Bronze

            // Failsafe: If filtering removed EVERYTHING (e.g. day time), pick ANY object
            // This prevents the "blank screen" issue.
            if (candidates.length === 0) {
                console.warn("[Inspiration] No visible targets found. Showing unfiltered fallback.");
                candidates = dataSource.slice(0, 50); // Just take top 50 raw items
            }

            // Sort & Shuffle
            // Sort by Altitude Descending (best ones first)
            candidates.sort((a, b) => {
                const altA = parseFloat(a['Max Altitude (°)']) || 0;
                const altB = parseFloat(b['Max Altitude (°)']) || 0;
                return altB - altA;
            });

            // Shuffle top pool
            const poolSize = Math.min(candidates.length, 30);
            const topPool = candidates.slice(0, poolSize);
            for (let i = topPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [topPool[i], topPool[j]] = [topPool[j], topPool[i]];
            }
            const topPicks = topPool.slice(0, 12);

            loading.style.display = 'none';

            // --- ONBOARDING BANNER CHECK ---
            // 1. Check current visible candidates
            const hasCustomImages = candidates.some(obj => obj.image_url && obj.image_url.trim() !== "");

            // 2. Check GLOBAL dataset (prevents banner if user has images elsewhere but filtered out)
            //    This stops the banner from annoying users who already know how to use the feature.
            const globalHasCustom = (window.latestDSOData || []).some(obj => obj.image_url && obj.image_url.trim() !== "");

            // Check if data is still streaming (prevents banner flicker on partial loads)
            const isLoading = document.getElementById("data-body")?.dataset.loading === 'true';

            // Only show if: No custom images in current set, No custom images globally, Data exists, and Not loading
            if (!hasCustomImages && !globalHasCustom && candidates.length > 0 && !isLoading) {
                const wrapper = document.getElementById('inspiration-wrapper');
                const banner = document.createElement('div');
                banner.className = 'inspiration-banner';
                banner.innerHTML = `
                    <div style="font-size: 24px;"></div>
                    <div>
                        <strong>` + window.t('add_own_inspiration') + `</strong><br>
                        ` + window.t('seeing_automated_survey_images') + `<br>
                        ` + window.t('display_own_astrophotos') + `<br>
                        <span style="color:var(--text-secondary); font-size:0.9em; margin-top:4px; display:block;">` + window.t('go_to_config_manage_objects') + `</span>
                    </div>
                    <span class="close-banner" data-action="close-banner">✕</span>
                `;
                // Insert before the grid container
                wrapper.insertBefore(banner, grid);
            }

            // 3. Render Tiles
            for (const obj of topPicks) {
                const raDeg = (parseFloat(obj['RA (hours)']) || 0) * 15;
                const decDeg = parseFloat(obj['DEC (degrees)']) || 0;
                const dssUrl = getAladinFallbackUrl(raDeg, decDeg, obj.Size);
                const hasCoords = (dssUrl !== null);

                // Create Skeleton
                const tile = document.createElement('div');
                tile.className = 'astro-tile';
                tile.innerHTML = `
                    <div class="tile-image skeleton-pulse">
                        <img style="opacity:0;">
                        <div class="img-source-badge" style="display:none;"></div>
                    </div>
                    <div class="tile-content">
                        <div class="tile-header">
                            <span class="tile-title">${obj.Object}</span>
                            <span class="tile-type">${obj.Type || ''}</span>
                        </div>
                        <div class="tile-common-name">${obj['Common Name'] || ''}</div>
                        <div class="tile-summary skeleton-text">${i18n.loading}</div>
                        <div class="tile-stats">
                            <div class="tile-stat-pill">${i18n.alt} ${obj['Max Altitude (°)']}</div>
                            <div class="tile-stat-pill">${i18n.dur} ${Math.round((parseFloat(obj['Observable Duration (min)'])||0)/60*1)/1}${i18n.h}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(tile);

                // Async Resolve
                (async () => {
                    const imgEl = tile.querySelector('img');
                    const badgeEl = tile.querySelector('.img-source-badge');
                    const sumEl = tile.querySelector('.tile-summary');

                    let finalImg = null;
                    let finalImgSource = "";
                    let finalImgLink = "";

                    let finalText = "";
                    let finalDescSource = "";
                    let finalDescLink = "";

                    // 1. Database Content (Primary)
                    if (obj.image_url) {
                        finalImg = obj.image_url;
                        finalImgSource = obj.image_credit || "Catalog";
                        finalImgLink = obj.image_source_link || "";
                    }

                    if (obj.description_text) {
                        finalText = obj.description_text;
                        finalDescSource = obj.description_credit || "";
                        finalDescLink = obj.description_source_link || "";
                    }

                    // 2. Fallback: DSS2 (Image Only)
                    if (!finalImg && hasCoords) {
                        finalImg = dssUrl;
                        finalImgSource = "DSS2";
                    }

                    // 5. Update UI
                    const setOfflineState = () => {
                        tile.querySelector('.tile-image').classList.remove('skeleton-pulse');
                        tile.querySelector('.tile-image').innerHTML = `
                            <div class="offline-message" style="height:100%; min-height:0; border:none; background:var(--bg-light); border-radius:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0;">
                                <div style="font-size:24px; opacity:0.3; margin-bottom:5px; filter: grayscale(1);">📡</div>
                                <div style="font-size:12px; color:var(--text-muted-alt);">Offline</div>
                            </div>`;
                    };

                    imgEl.onload = () => {
                        imgEl.style.opacity = '1';
                        tile.querySelector('.tile-image').classList.remove('skeleton-pulse');
                    };

                    imgEl.onerror = () => {
                        // Image failed to load (e.g. broken link or network drop)
                        setOfflineState();
                    };

                    if (!navigator.onLine) {
                        // Browser is strictly offline
                        setOfflineState();
                    } else if (finalImg) {
                        imgEl.src = finalImg;
                        badgeEl.textContent = finalImgSource;
                        badgeEl.style.display = 'block';
                    } else {
                        // No image URL found
                        tile.querySelector('.tile-image').innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:var(--text-muted-alt);">' + i18n.noImage + '</div>';
                        tile.querySelector('.tile-image').classList.remove('skeleton-pulse');
                    }

                    if (finalText) {
                        sumEl.textContent = finalText;
                    } else {
                        sumEl.textContent = `${i18n.type} ${obj.Type || i18n.dso}. ${i18n.locatedIn} ${obj.Constellation || i18n.unknown}.`;
                    }
                    sumEl.classList.remove('skeleton-text');

                    tile.onclick = () => openInspirationModal(obj, finalImg, finalText || sumEl.textContent, finalImgSource, finalImgLink, finalDescSource, finalDescLink);

                })();
            }
        } catch (err) {
            console.error("Critical Grid Error:", err);
            grid.innerHTML = '<div class="empty-state"><p>' + i18n.errorRenderGrid + '</p></div>';
            loading.style.display = 'none';
        }
    }

    // --- Helpers (Unchanged) ---
    function filterCandidates(data, minAlt, minDur) {
        return data.filter(obj => {
            if (obj.error) return false;
            const maxAlt = parseFloat(obj['Max Altitude (°)']);
            const duration = parseFloat(obj['Observable Duration (min)']);
            return !isNaN(maxAlt) && maxAlt > minAlt && !isNaN(duration) && duration > minDur;
        });
    }

    function openInspirationModal(obj, imgSrc, summary, source, wikiUrl) {
        const imgEl = document.getElementById('modal-img');
        const imgContainer = document.querySelector('.insp-modal-image');
        const modalController = inspirationModalController || (window.novaState && window.novaState.fn.inspirationModal);

        if (!modalController) {
            console.warn('[Inspiration] ModalController not available, using fallback');
            const modal = document.getElementById('inspiration-modal');
            modal.style.display = 'block';
            // Continue with rest of function
        }

        // Helper to show offline/error state inside the modal
        const showOfflinePlaceholder = () => {
            imgEl.style.display = 'none';
            // Only append if not already there
            if (!imgContainer.querySelector('.offline-message')) {
                const offlineDiv = document.createElement('div');
                offlineDiv.className = 'offline-message';
                offlineDiv.style.cssText = "height:100%; min-height:0; border:none; background:var(--code-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; width: 100%;";
                offlineDiv.innerHTML = '<div style="font-size:40px; opacity:0.3; margin-bottom:10px; filter: grayscale(1);">📡</div><div style="color:var(--text-quaternary);">' + i18n.imageUnavailable + '</div>';
                imgContainer.appendChild(offlineDiv);
            }
        };

        // 1. Reset State (Remove old placeholders, show image tag)
        const existingMsg = imgContainer.querySelector('.offline-message');
        if(existingMsg) existingMsg.remove();
        imgEl.style.display = 'block';

        // 2. Handle Image Logic
        if (!navigator.onLine && imgSrc) {
            // Offline Mode
            showOfflinePlaceholder();
        } else {
            // Online Mode (or attempting to load)
            imgEl.src = imgSrc || "";

            if (!imgSrc) {
                imgEl.style.display = 'none'; // Just black background if no image exists
            }

            // Fallback: If image fails to load (e.g. broken link), show placeholder
            imgEl.onerror = function() {
                showOfflinePlaceholder();
            };
        }

        // 3. Populate Data
        document.getElementById('insp-modal-title').textContent = obj.Object;
        document.getElementById('modal-subtitle').textContent = obj['Common Name'] || "";
        document.getElementById('modal-alt').textContent = obj['Max Altitude (°)'];
        document.getElementById('modal-transit').textContent = obj['Transit Time'];
        document.getElementById('modal-dur').textContent = Math.round((parseFloat(obj['Observable Duration (min)'])||1)/60*10)/10 + " " + i18n.hrs;
        document.getElementById('modal-const').textContent = obj.Constellation || i18n.na;
        document.getElementById('modal-text').textContent = summary;

        // 4. Handle Attribution
        const attrib = document.getElementById('modal-attribution');
        if (source === "Wiki") {
            attrib.innerHTML = i18n.source + ' <a href="${wikiUrl}" target="_blank">' + i18n.sourceWikipedia + '</a>';
        } else if (source === "NASA") {
            attrib.innerHTML = i18n.source + ' <a href="${wikiUrl}" target="_blank">' + i18n.sourceNasa + '</a>';
        } else if (source === "DSS2") {
            attrib.innerHTML = i18n.source + ' ' + i18n.sourceDss2;
        } else {
            if (wikiUrl) {
                attrib.innerHTML = i18n.source + ' <a href="${wikiUrl}" target="_blank">${source}</a>';
            } else {
                attrib.innerHTML = i18n.source + ' ' + source;
            }
        }

        // 5. Setup Action Buttons
        document.getElementById('modal-graph-btn').onclick = () => showGraph(obj.Object, null, 'chart');

        // 6. OPEN MODAL
        if (modalController) {
            modalController.open();
        } else {
            document.getElementById('inspiration-modal').style.display = 'block';
        }
    }

    function closeInspirationModal() {
        const modalController = inspirationModalController || (window.novaState && window.novaState.fn.inspirationModal);
        if (modalController) {
            modalController.close();
        } else {
            document.getElementById('inspiration-modal').style.display = 'none';
        }
    }

    // --- Event delegation for inspiration section data-actions ---
    document.addEventListener('click', function(e) {
        const target = e.target.closest('[data-action]');
        if (!target) return;

        const action = target.dataset.action;

        // Handle data-actions
        switch(action) {
            case 'refresh-inspiration':
                renderInspirationGrid(e);
                return;
            case 'close-inspiration-modal':
                closeInspirationModal();
                e.preventDefault();
                return;
        }
    });

    // Expose functions for use by other scripts
    window.renderInspirationGrid = renderInspirationGrid;
    window.closeInspirationModal = closeInspirationModal;
</script>
