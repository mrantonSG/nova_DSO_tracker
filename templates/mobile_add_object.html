{% extends "mobile_base.html" %}

{% block title %}{{ _('Add Object') }}{% endblock %}
{% block header_title %}{{ _('Add Object') }}{% endblock %}

{% block content %}
    <div class="form-group">
        <label for="search-name">{{ _('Object Name') }}</label>
        <input type="text" id="search-name" placeholder="{{ _('e.g., M42 or NGC1976') }}">
    </div>
    <button class="button" id="search-button" style="margin-top: 10px;">{{ _('Search SIMBAD') }}</button>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid var(--border-color);">

    <form id="add-form" style="display: none;">
        <div class="form-group">
            <label for="object-name">{{ _('Object ID') }}</label>
            <input type="text" id="object-name" readonly>
        </div>
        <div class="form-group">
            <label for="common-name">{{ _('Common Name') }}</label>
            <input type="text" id="common-name">
        </div>

        <div class="form-group">
            <label for="ra">{{ _('RA (hours)') }}</label>
            <input type="text" id="ra">
        </div>

        <div class="form-group">
            <label for="dec">{{ _('DEC (degrees)') }}</label>
            <input type="text" id="dec">
        </div>

        <div class="form-group">
            <label for="trix-notes">{{ _('Project Notes') }}</label>
            <input id="project-notes" type="hidden" name="content">
            <trix-editor input="project-notes"></trix-editor>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 20px;">
            <input type="checkbox" id="is-active" style="width: auto;">
            <label for="is-active" style="margin: 0; font-weight: normal;">{{ _('Set as Active Project') }}</label>
        </div>

        <button type="submit" class="button" id="save-button" style="margin-top: 20px;">{{ _('Save Object') }}</button>
    </form>

    <div id="message-area" class="message" style="display: none;"></div>
{% endblock %}

{% block scripts %}
<script>
    // Translated strings for i18n
    const i18n = {
        searchingFor: "{{ _('Searching for %%(name)s...') }}",
        objectNotFound: "{{ _('Object not found.') }}",
        errorConnecting: "{{ _('Error connecting to server.') }}",
        saving: "{{ _('Saving...') }}",
        objectSaved: "{{ _('Object saved successfully!') }}",
        saveObject: "{{ _('Save Object') }}",
        error: "{{ _('Error:') }}"
    };

    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('search-name');
        const searchButton = document.getElementById('search-button');
        const addForm = document.getElementById('add-form');
        const messageArea = document.getElementById('message-area');

        const objInput = document.getElementById('object-name');
        const nameInput = document.getElementById('common-name');
        const raInput = document.getElementById('ra');
        const decInput = document.getElementById('dec');

        // --- Get the Trix editor and its hidden input field ---
        const notesEditor = document.querySelector('trix-editor');
        const notesInput = document.getElementById('project-notes'); // The hidden input
        // ---

        const activeCheckbox = document.getElementById('is-active');
        const saveButton = document.getElementById('save-button');

        // ... (The 'searchButton' click listener remains the same) ...
        searchButton.addEventListener('click', async () => {
            const objectName = searchInput.value;
            if (!objectName) return;

            // Set loading state on the search button
            const originalText = searchButton.textContent;
            searchButton.textContent = i18n.searchingFor.replace('%(name)s', objectName);
            searchButton.classList.add('loading');

            messageArea.textContent = '';
            messageArea.style.display = 'none';
            addForm.style.display = 'none';

            try {
                const response = await fetch("{{ url_for('core.search_object') }}", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ object: objectName })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Populate the form with data from SIMBAD
                    objInput.value = data.data['Object'];
                    nameInput.value = data.data['Common Name'];
                    raInput.value = data.data['RA (hours)'];
                    decInput.value = data.data['DEC (degrees)'];

                    addForm.style.display = 'block';
                } else {
                    messageArea.textContent = data.message || i18n.objectNotFound;
                    messageArea.style.display = 'block';
                }
            } catch (e) {
                messageArea.textContent = i18n.errorConnecting;
                messageArea.style.display = 'block';
            } finally {
                // Restore the search button
                searchButton.textContent = originalText;
                searchButton.classList.remove('loading');
            }
        });


        // --- FIX #1: THE TRIX UPLOAD HANDLER ---
        // This listens for when you drop an image into editor.
        notesEditor.addEventListener('trix-attachment-add', (event) => {
            const file = event.attachment.file;
            if (file) {
                // 1. Create a FormData object
                const formData = new FormData();
                formData.append('file', file);

                // 2. Post it to your (already existing) upload endpoint
                fetch("{{ url_for('tools.upload_editor_image') }}", {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.url) {
                    // 3. On success, tell Trix the URL of the uploaded image
                        event.attachment.setAttributes({
                            url: data.url,
                            href: data.url
                        });
                    }
                })
                .catch(e => {
                console.error('Upload failed:', e);
                event.attachment.remove(); // Remove the failed upload
                });
            }
        });
        // --- END OF FIX #1 ---


        // 2. Save the Object
        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            saveButton.disabled = true;
            saveButton.textContent = i18n.saving;

            // --- FIX #2: SAVE THE HTML, NOT PLAIN TEXT ---
            // We get the .value from the *hidden input field*
            // which Trix keeps updated with the full HTML.
            const notesHtml = notesInput.value;
            // --- END OF FIX #2 ---

            const payload = {
                object: objInput.value,
                name: nameInput.value,
                ra: raInput.value,
                dec: decInput.value,
                project: notesHtml, // Use the HTML content
                is_active: activeCheckbox.checked
            };

            try {
                // ... (rest of the save logic is the same) ...
                const response = await fetch("{{ url_for('core.confirm_object') }}", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    messageArea.textContent = i18n.objectSaved.replace('%(name)s', payload.object);
                    messageArea.style.display = 'block';
                    addForm.style.display = 'none';
                    searchInput.value = '';
                } else {
                    messageArea.textContent = i18n.error + ' ' + data.message;
                    messageArea.style.display = 'block';
                    saveButton.disabled = false;
                    saveButton.textContent = i18n.saveObject;
                }
            } catch (e) {
                messageArea.textContent = i18n.errorConnecting;
                saveButton.disabled = false;
                saveButton.textContent = i18n.saveObject;
            }
        });
    });
</script>
{% endblock %}
