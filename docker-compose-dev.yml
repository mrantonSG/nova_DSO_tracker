services:
  nova:
# in dev mode, build image from local code
# instead of using the official image
#    image: mrantonsg/nova-dso-tracker
    build:
      context: .
    container_name: nova
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./nova_data:/app/instance
      # Hot reload: mount source code
      - ./nova:/app/nova:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    env_file:
      - .env
    environment:
      - SINGLE_USER_MODE=${SINGLE_USER_MODE:-True}
      - SECRET_KEY=${SECRET_KEY:-}
      - FLASK_APP=nova:app
      - FLASK_DEBUG=1
    command: ["flask", "run", "--host=0.0.0.0", "--port=5001", "--reload"]
    restart: unless-stopped
